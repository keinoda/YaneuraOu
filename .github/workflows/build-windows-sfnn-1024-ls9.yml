name: Build NAGISA_V3 Windows

on:
  workflow_dispatch:
  push:
    branches:
      - codex/nagisa-v3-release

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-2022
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        target_cpu:
          - AVX2
          - SSE42

    steps:
      - name: Checkout時の改行変換を無効化
        shell: pwsh
        run: git config --global core.autocrlf input

      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: main

      - name: MSYS2環境を準備
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-clang
            mingw-w64-x86_64-lld
            mingw-w64-x86_64-python

      - name: Windows tournament版をビルド
        shell: msys2 {0}
        env:
          TARGET_CPU: ${{ matrix.target_cpu }}
          OUTPUT_NAME: NAGISA_V3-Windows-${{ matrix.target_cpu }}.exe
        run: |
          set -euxo pipefail
          mkdir -p artifact
          cd main/source
          mingw32-make -j"$(nproc)" nagisa-v3 \
            OS=Windows_NT \
            TARGET_CPU="${TARGET_CPU}" \
            2>&1 | tee ../../artifact/build.log
          test -s YaneuraOu-by-gcc.exe
          cp YaneuraOu-by-gcc.exe "../../artifact/${OUTPUT_NAME}"
          printf 'usi\nquit\n' | ./YaneuraOu-by-gcc.exe | tee ../../artifact/usi.txt
          grep -F 'id name NAGISA_V3 NNUE 9.60' ../../artifact/usi.txt
          grep -F 'id author nagisa' ../../artifact/usi.txt
          grep -F 'option name LS_BUCKET_MODE type combo default progress8kpabs' ../../artifact/usi.txt
          grep -F 'var progress8ek' ../../artifact/usi.txt
          grep -F 'option name FullTimeMode type check default false' ../../artifact/usi.txt
          for hidden_option in \
            OpeningTargetSfenBlack OpeningTargetSfenWhite OpeningTargetMaxPly OpeningTargetPenalty \
            SlowMover_black SlowMover_white ProgressSlowMover ProgressSlowMoverScales ProgressMtg \
            PonderMissMaximumScale BookRepetitionPly BookIgnoreRepeatedRoot; do
            if grep -Fq "option name ${hidden_option} type" ../../artifact/usi.txt; then
              printf '非表示オプションがUSI応答に含まれています: %s\n' "${hidden_option}" >&2
              exit 1
            fi
          done
          grep -F 'usiok' ../../artifact/usi.txt
          file "../../artifact/${OUTPUT_NAME}" | tee ../../artifact/file.txt
          (cd ../../artifact && sha256sum "${OUTPUT_NAME}" > SHA256SUMS)
          printf '%s\n' \
            "commit=${GITHUB_SHA}" \
            "make_target=nagisa-v3" \
            "YANEURAOU_EDITION=YANEURAOU_ENGINE_SFNN_halfkahm2_1024_15_64_ls9" \
            "PYTHON=python3" \
            "TARGET_CPU=${TARGET_CPU}" \
            "COMPILER=clang++" \
            "target=tournament" \
            "EXTRA_CPPFLAGS=-DHASH_KEY_BITS=128 -DTT_CLUSTER_SIZE=4 -DUSE_LAZY_EVALUATE" \
            > ../../artifact/BUILD_ARGS.txt

      - name: ビルド成果物を保存
        uses: actions/upload-artifact@v4
        with:
          name: NAGISA_V3-Windows-${{ matrix.target_cpu }}-${{ github.sha }}
          path: artifact/
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
